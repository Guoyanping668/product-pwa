<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品报价查询系统</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon/icon-192.png">
<link rel="apple-touch-icon" href="favicon/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a90e2">
</head>
<body>
  <header>
    <h1>📦 产品报价查询系统</h1>
  </header>

  <main>
    <section class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入产品名称/型号/品牌进行模糊搜索...">
        <button id="searchBtn">🔍 搜索</button>
        <button id="clearSearchBtn">✖ 清空</button>
      </div>

      <div class="column-selector">
        <span>显示列：</span>
        <label><input type="checkbox" class="col-check" value="品牌名称" checked> 品牌</label>
        <label><input type="checkbox" class="col-check" value="产品名称" checked> 产品名</label>
        <label><input type="checkbox" class="col-check" value="产品型号" checked> 型号</label>
        <label><input type="checkbox" class="col-check" value="产品价格" checked> 价格</label>
        <label><input type="checkbox" class="col-check" value="报价日期" checked> 报价日期</label>
        <label><input type="checkbox" class="col-check" value="报价人" checked> 报价人</label>
        <label><input type="checkbox" class="col-check" value="联系方式" checked> 联系方式</label>
        <label><input type="checkbox" class="col-check" value="所属部门" checked> 部门</label>
        <label><input type="checkbox" class="col-check" value="负责区域" checked> 负责区域</label>
        <label><input type="checkbox" class="col-check" value="客户名称" checked> 客户</label>
        <label><input type="checkbox" class="col-check" value="关键参数" checked> 关键参数</label>
        <label><input type="checkbox" class="col-check" value="配置文档路径" checked> 配置文档</label>
      </div>

      <div class="sort-box">
        <span>排序：</span>
        <button class="sort-btn" data-sort="品牌名称">品牌</button>
        <button class="sort-btn" data-sort="产品型号">型号</button>
        <button class="sort-btn" data-sort="产品价格">价格</button>
        <button class="sort-btn" data-sort="报价日期">日期</button>
      </div>

      <div class="upload-area">
        <input type="file" id="fileInput" accept=".xlsx, .xls">
        <button id="uploadBtn">📤 上传Excel</button>
        <button id="checkDuplicateBtn">🔍 查重</button>
        <button id="batchDeleteBtn">🗑 批量删除选中</button>
      </div>
    </section>

    <div class="table-container">
      <table id="dataTable">
        <thead>
          <tr id="tableHeaderRow"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="noData">暂无数据，请上传Excel或手动添加</div>
    </div>

    <section class="add-form">
      <h2>➕ 手动添加数据</h2>
      <form id="addRecordForm">
        <input type="text" name="品牌名称" placeholder="品牌名称" required>
        <input type="text" name="产品名称" placeholder="产品名称" required>
        <input type="text" name="产品型号" placeholder="产品型号" required>
        <input type="number" name="产品价格" placeholder="产品价格" step="0.01" required>
        <input type="date" name="报价日期" required>
        <input type="text" name="报价人" placeholder="报价人">
        <input type="text" name="联系方式" placeholder="联系方式">
        <input type="text" name="所属部门" placeholder="所属部门">
        <input type="text" name="负责区域" placeholder="负责区域">
        <input type="text" name="客户名称" placeholder="客户名称">
        <input type="text" name="关键参数" placeholder="关键参数">
        <input type="text" name="配置文档路径" placeholder="配置文档路径">
        <button type="submit">✔ 保存</button>
      </form>
    </section>
  </main>

  <script src="lib/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
